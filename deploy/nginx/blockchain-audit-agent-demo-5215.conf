# Nginx demo site for Blockchain-Asset-Audit-Agent.
#
# Goals:
# - Do not touch existing 80/443 virtual hosts.
# - Listen only on port 5215.
# - Serve frontend/dist as static files.
# - Route all SPA paths back to /index.html.
# - Proxy /api/* to the local FastAPI backend on 127.0.0.1:8042, stripping the /api prefix.
#
# Before enabling this config:
# 1. Build the frontend with VITE_API_BASE_URL=/api
# 2. Start backend only:
#      BACKEND_HOST=127.0.0.1 ENABLE_FRONTEND_SERVER=0 bash scripts/deploy.sh restart
# 3. Publish frontend/dist into /var/www so nginx can read it safely:
#      sudo bash scripts/publish_frontend.sh

server {
  listen 5215;
  listen [::]:5215;
  server_name _;

  root /var/www/blockchain-audit-agent-demo;
  index index.html;

  client_max_body_size 32m;

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8042/;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}